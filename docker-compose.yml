version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: freshcart_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: freshcart_admin
      MONGO_INITDB_ROOT_PASSWORD: freshcart_secret
      MONGO_INITDB_DATABASE: freshcart
    volumes:
      - freshcart_mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-seed:
    image: node:20-alpine
    container_name: freshcart_seed
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://freshcart_admin:freshcart_secret@mongodb:27017/freshcart?authSource=admin
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: >
      sh -c "npm install --silent && npx ts-node --skipProject -e \"
        process.env.MONGO_URI='mongodb://freshcart_admin:freshcart_secret@mongodb:27017/freshcart?authSource=admin';
        require('./lib/seed').seedDatabase().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); })
      \""
    profiles:
      - seed

volumes:
  freshcart_mongo_data:
    name: freshcart_mongo_data
